<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket to Ride Companion</title>
    <style>
        :root {
            --primary: #8b0000;
            --secondary: #f4e4bc;
            --accent: #daa520;
            --text: #333;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .status-bar {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .status-success { background-color: #d4edda; color: var(--success); border: 1px solid #c3e6cb; display: block; }
        .status-error { background-color: #f8d7da; color: var(--error); border: 1px solid #f5c6cb; display: block; }
        .status-loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; display: block; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px dashed var(--primary);
            border-radius: 4px;
            cursor: pointer;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }

        .route-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            vertical-align: middle;
            margin-right: 8px;
            border: 1px solid #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ticket to Ride Companion</h1>

        <div id="status" class="status-bar">Iniciando...</div>

        <div class="controls">
            <label for="csvFile">Upload Manual (Fallback):</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Buscar por cidade ou cor...">

        <div id="tableContainer">
            <table id="routesTable">
                <thead>
                    <tr>
                        <th>Origem</th>
                        <th>Destino</th>
                        <th>Cor</th>
                        <th>Tamanho</th>
                        <th>Pontos</th>
                    </tr>
                </thead>
                <tbody id="routesBody">
                    <!-- Dados serão inseridos aqui -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allRoutes = [];

        // 1. Função para carregar CSV automaticamente ao iniciar
        window.addEventListener('DOMContentLoaded', () => {
            loadRoutesFromServer();
        });

        // 2. Carregar do Vercel (/rotas.csv)
        async function loadRoutesFromServer() {
            const statusDiv = document.getElementById('status');
            showStatus('Carregando rotas do servidor...', 'loading');

            try {
                const response = await fetch('/rotas.csv');
                
                if (!response.ok) {
                    throw new Error(`Erro ao carregar arquivo: ${response.status} ${response.statusText}`);
                }

                const csvData = await response.text();
                processCSV(csvData);
                showStatus('Rotas carregadas com sucesso!', 'success');
            } catch (error) {
                console.error('Erro no carregamento automático:', error);
                showStatus('Arquivo rotas.csv não encontrado no servidor. Use o upload manual.', 'error');
            }
        }

        // 3. Tratamento de Upload Manual (Fallback)
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                processCSV(e.target.result);
                showStatus('Arquivo manual carregado com sucesso!', 'success');
            };
            reader.onerror = () => showStatus('Erro ao ler o arquivo manual.', 'error');
            reader.readAsText(file);
        });

        // 4. Processamento dos dados CSV
        function processCSV(csvText) {
            const lines = csvText.split(/\r?\n/);
            const result = [];
            
            // Assume que a primeira linha é o cabeçalho: origem,destino,cor,tamanho,pontos
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const columns = lines[i].split(',');
                if (columns.length >= 5) {
                    result.push({
                        origem: columns[0].trim(),
                        destino: columns[1].trim(),
                        cor: columns[2].trim(),
                        tamanho: columns[3].trim(),
                        pontos: columns[4].trim()
                    });
                }
            }
            
            allRoutes = result;
            renderTable(allRoutes);
        }

        // 5. Renderização da Tabela
        function renderTable(routes) {
            const tbody = document.getElementById('routesBody');
            tbody.innerHTML = '';

            routes.forEach(route => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${route.origem}</td>
                    <td>${route.destino}</td>
                    <td><span class="route-color" style="background-color: ${translateColor(route.cor)}"></span>${route.cor}</td>
                    <td>${route.tamanho}</td>
                    <td>${route.pontos}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 6. Filtro de Busca
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allRoutes.filter(r => 
                r.origem.toLowerCase().includes(term) || 
                r.destino.toLowerCase().includes(term) || 
                r.cor.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        // Helpers
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status-bar status-' + type;
        }

        function translateColor(colorName) {
            const colors = {
                'Vermelho': '#e31a1c',
                'Azul': '#1f78b4',
                'Verde': '#33a02c',
                'Amarelo': '#ffd700',
                'Preto': '#333333',
                'Branco': '#ffffff',
                'Rosa': '#fb9a99',
                'Laranja': '#ff7f00',
                'Cinza': '#a9a9a9',
                'Coringa': 'linear-gradient(45deg, red, blue, green, yellow)'
            };
            return colors[colorName] || '#ccc';
        }
    </script>
</body>
</html>
